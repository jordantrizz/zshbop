services:
  zerobyte:
    image: ghcr.io/nicotsx/zerobyte:v0.29.1
    container_name: {{CONTAINER_NAME}}
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    ports:
      - "127.0.0.1:4096:4096"
    environment:
      - TZ=UTC
      - BASE_URL=https://{{FQDN}}
      - APP_SECRET={{ZEROBYTE_APP_SECRET}}
      - PORT=4096
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /srv/containers/{{CONTAINER_NAME}}/data:/var/lib/zerobyte
    networks:
      - {{NETWORK}}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.{{CONTAINER_NAME}}.rule=Host(`{{FQDN}}`)"
      - "traefik.http.routers.{{CONTAINER_NAME}}.entrypoints=websecure"
      - "traefik.http.routers.{{CONTAINER_NAME}}.tls.certresolver=letsencrypt"
      - "traefik.http.services.{{CONTAINER_NAME}}.loadbalancer.server.port=4096"

networks:
  {{NETWORK}}:
    external: true
